<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<form>
    
<h1>
    <a href="https://www.snapsurveys.com/blog/5-reasons-feedback-important/" target="_blank">
    
    Student Feedback
    </a>
</h1>

<!-- SUBJECT TABS -->
<div class="subjects">
    <a href="#">Cybersecurity</a>
    <a href="#">Linux</a>
    <a href="#">Networking</a>
    <a href="#">Python</a>
</div>

<h2>Give Your Feedback</h2>

<!-- 10 QUESTIONS -->
<div class="question">
    <label>1. Rate course content:</label>
    <input type="range" min="0" max="10">
</div>

<div class="question">
    <label>2. Teaching quality:</label>
    <input type="range" min="0" max="10">
</div>

<div class="question">
    <label>3. Practical knowledge:</label>
    <input type="range" min="0" max="10">
</div>

<div class="question">
    <label>4. Syllabus relevance:</label>
    <input type="range" min="0" max="10">
</div>

<div class="question">
    <label>5. Interaction level:</label>
    <input type="range" min="0" max="10">
</div>

<div class="question">
    <label>6. Overall satisfaction:</label>
    <input type="range" min="0" max="10">
</div>

<div class="question">
    <label>7. Would you recommend?</label>
    <input type="checkbox"> Yes
    <input type="checkbox"> No
</div>

<div class="question">
    <label>8. Best part of course:</label>
    <textarea></textarea>
</div>

<div class="question">
    <label>9. Improvements needed:</label>
    <textarea></textarea>
</div>

<div class="question">
    <label>10. Additional comments:</label>
    <textarea></textarea>
</div>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
